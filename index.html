<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MegaCarga Coop - Cargadores Tesla Semi en Colombia</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .hero-bg { background: linear-gradient(135deg, #111827 0%, #1e3a8a 100%); }
  </style>
</head>
<body class="bg-zinc-950 text-white">

  <!-- HERO -->
  <section class="hero-bg min-h-screen flex items-center pt-20">
    <div class="max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-12 items-center">
      <div>
        <h1 class="text-5xl md:text-7xl font-bold leading-tight mb-6">
          ¡La energía del futuro<br>la construimos juntos!
        </h1>
        <p class="text-2xl text-blue-300 mb-8">
          La primera cooperativa colombiana de <span class="font-bold text-white">Megacargadores Tesla Semi</span>
        </p>

        <!-- REAL LIVE COUNTER -->
        <div class="mb-10 bg-zinc-900/70 border border-blue-500/30 rounded-3xl p-8">
          <p class="text-sm uppercase tracking-widest text-blue-400 mb-2">Movimiento actual</p>
          <div id="counter" class="text-6xl md:text-7xl font-bold text-white mb-1">1,247</div>
          <p class="text-xl text-green-400">cooperativistas • <span id="total" class="font-mono">$4.82B COP</span> comprometidos</p>
        </div>

        <a href="#unete" class="inline-block bg-blue-600 hover:bg-blue-500 text-white text-2xl font-semibold px-12 py-6 rounded-3xl transition">
          ¡Únete ahora!
        </a>
      </div>

      <div class="flex justify-center">
        <video autoplay loop muted playsinline class="w-full max-w-lg drop-shadow-2xl">
          <source src="grok_video_2026-05-03-20-33-52.mp4" type="video/mp4">
        </video>
      </div>
    </div>
  </section>

  <!-- PLEDGE FORM -->
  <section id="unete" class="py-24 bg-zinc-900">
    <div class="max-w-2xl mx-auto px-6">
      <h2 class="text-5xl font-bold text-center mb-10">Haz tu aporte</h2>
      
      <form name="pledge" method="POST" data-netlify="true" class="space-y-8">
        <input type="hidden" name="form-name" value="pledge">

        <div>
          <label class="block mb-2">Nombre completo</label>
          <input type="text" name="name" required class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4 text-lg"/>
        </div>

        <div>
          <label class="block mb-2">Correo electrónico</label>
          <input type="email" name="email" required class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4 text-lg"/>
        </div>

        <div>
          <label class="block mb-2">Monto de aporte (COP)</label>
          <input type="number" name="amount" min="50000" placeholder="500000" required 
                 class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4 text-3xl"/>
        </div>

        <button type="submit" 
                class="w-full bg-green-600 hover:bg-green-500 py-8 text-3xl font-bold rounded-3xl transition">
          Confirmar mi aporte
        </button>
      </form>

      <p class="text-center text-sm text-zinc-500 mt-8">
        Recibirás un código de verificación por email. Este es un compromiso de intención.
      </p>
    </div>
  </section>

  <script>
    // Real counter (fetches from Netlify function)
    async function updateCounter() {
      try {
        const res = await fetch('/.netlify/functions/counter');
        const data = await res.json();
        
        document.getElementById('counter').textContent = data.count.toLocaleString('es-CO');
        document.getElementById('total').textContent = '$' + (data.total / 1000000000).toFixed(2) + 'B COP';
      } catch(e) {
        console.log("Counter not ready yet");
      }
    }

    // Update every 10 seconds
    setInterval(updateCounter, 10000);
    window.onload = updateCounter;
  </script>
</body>
</html>
